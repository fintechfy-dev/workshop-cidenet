services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop_cidenet
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      CONNECTION_STRING: "Host=db;Port=5432;Database=workshop_cidenet;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: "http://localhost:5000"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db-data:
